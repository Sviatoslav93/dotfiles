gui:
  nerdFontsVersion: "3"
  showFileTree: true
  showRandomTip: false
  showBottomLine: true
  showCommandLog: false
  showIcons: true
  border: rounded
  theme:
    activeBorderColor:
      - "#7aa2f7"
      - bold
    inactiveBorderColor:
      - "#565f89"
    searchingActiveBorderColor:
      - "#e0af68"
      - bold
    optionsTextColor:
      - "#7dcfff"
    selectedLineBgColor:
      - "#283457"
    cherryPickedCommitBgColor:
      - "#3b4261"
    cherryPickedCommitFgColor:
      - "#bb9af7"
    unstagedChangesColor:
      - "#f7768e"
    defaultFgColor:
      - "#c0caf5"
git:
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never
os:
  editPreset: nvim
refresher:
  refreshInterval: 5
  fetchInterval: 60
update:
  method: never
notARepository: quit
keybinding:
  universal:
    quit: "q"
    return: "<esc>"
    prevItem: "k"
    nextItem: "j"
    prevPage: "K"
    nextPage: "J"
    scrollUpMain: "<c-u>"
    scrollDownMain: "<c-d>"
